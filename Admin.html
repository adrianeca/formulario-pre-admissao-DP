<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRASAS DP – Painel de Admissão</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
    .header {
      background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
      color: #fff; padding: 24px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header p  { font-size: 13px; opacity: 0.75; margin-top: 4px; }
    .container { max-width: 960px; margin: 0 auto; padding: 28px 20px; }

    .card { background: #fff; border-radius: 10px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .card-titulo { font-size: 15px; font-weight: 700; color: #1a237e; padding-bottom: 14px; margin-bottom: 20px; border-bottom: 2px solid #e8eaf6; }

    .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 200px; }
    .form-group label { font-size: 13px; font-weight: 600; color: #444; }
    .form-group input, .form-group select {
      padding: 10px 13px; border: 1.5px solid #ddd; border-radius: 7px;
      font-size: 14px; background: #fff; color: #333; transition: border-color .18s;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none; border-color: #3949ab; box-shadow: 0 0 0 3px rgba(57,73,171,.12);
    }
    .btn-gerar {
      padding: 10px 24px; background: #1a237e; color: #fff;
      border: none; border-radius: 7px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .18s; align-self: flex-end; white-space: nowrap;
    }
    .btn-gerar:hover { background: #283593; }
    .btn-gerar:disabled { background: #9fa8da; cursor: not-allowed; }

    .resultado { margin-top: 16px; padding: 14px 18px; border-radius: 8px; font-size: 14px; display: none; }
    .resultado.sucesso { background: #e8f5e9; border-left: 4px solid #2e7d32; color: #1b5e20; }
    .resultado.erro    { background: #ffebee; border-left: 4px solid #c62828; color: #b71c1c; }
    .resultado .link-gerado { font-family: monospace; font-size: 12px; word-break: break-all; margin-top: 8px; padding: 8px; background: rgba(0,0,0,.05); border-radius: 4px; }
    .btn-copiar { margin-top: 10px; padding: 7px 16px; background: #fff; border: 1.5px solid #2e7d32; color: #2e7d32; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 600; }
    .btn-copiar:hover { background: #e8f5e9; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #e8eaf6; color: #1a237e; font-weight: 700; padding: 10px 12px; text-align: left; }
    td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 10px; }
    .badge-pendente   { background: #fff8e1; color: #f57f17; }
    .badge-usado      { background: #f5f5f5; color: #999; }
    .badge-completo   { background: #e8f5e9; color: #2e7d32; }
    .badge-incompleto { background: #fff3e0; color: #e65100; }

    /* Badges de solicitação */
    .badge-sol-pendente   { background: #fff8e1; color: #f57f17; }
    .badge-sol-enviado    { background: #e3f2fd; color: #1565c0; }
    .badge-sol-andamento  { background: #fff3e0; color: #e65100; }
    .badge-sol-concluido  { background: #e8f5e9; color: #2e7d32; }

    .btn-acao {
      padding: 5px 14px; border: none; border-radius: 5px;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: background .15s;
    }
    .btn-acao-gerar { background: #1a237e; color: #fff; }
    .btn-acao-gerar:hover { background: #283593; }
    .btn-acao-gerar:disabled { background: #9fa8da; cursor: not-allowed; }
    .btn-copiar-link { padding: 4px 12px; background: #e8eaf6; border: none; border-radius: 5px; font-size: 12px; color: #1a237e; cursor: pointer; font-weight: 600; }
    .btn-copiar-link:hover { background: #c5cae9; }
    .btn-excluir { padding: 4px 10px; background: #ffebee; border: none; border-radius: 5px; font-size: 12px; color: #c62828; cursor: pointer; font-weight: 600; }
    .btn-excluir:hover { background: #ffcdd2; }

    .link-inline { font-family: monospace; font-size: 11px; color: #555; word-break: break-all; display: block; margin-top: 4px; max-width: 280px; }

    .vazio   { text-align: center; color: #aaa; padding: 30px; font-size: 14px; }
    .loading { text-align: center; color: #888; padding: 20px; font-size: 14px; }
    .btn-atualizar-tudo {
      padding: 8px 18px; background: rgba(255,255,255,0.15); color: #fff;
      border: 1.5px solid rgba(255,255,255,0.5); border-radius: 7px;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: background .18s;
      white-space: nowrap;
    }
    .btn-atualizar-tudo:hover { background: rgba(255,255,255,0.25); }

    .docs-detalhe { display: flex; gap: 24px; padding: 14px 12px; background: #f8f9fa; border-radius: 8px; flex-wrap: wrap; }
    .docs-col { flex: 1; min-width: 200px; }
    .docs-col strong { font-size: 12px; font-weight: 700; display: block; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #e0e0e0; }
    .enviados-col strong { color: #2e7d32; }
    .pendentes-col strong { color: #c62828; }
    .docs-col ul { list-style: none; padding: 0; margin: 0; }
    .docs-col li { font-size: 12px; padding: 3px 0; color: #444; }
    .enviados-col li::before { content: '✓ '; color: #2e7d32; font-weight: 700; }
    .pendentes-col li::before { content: '✗ '; color: #c62828; font-weight: 700; }
    .detail-row td { padding: 8px 12px !important; }

    /* Tela de login */
    .login-overlay {
      position: fixed; inset: 0; background: #f0f2f5;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
    }
    .login-card {
      background: #fff; border-radius: 12px; padding: 40px 36px;
      max-width: 400px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,.12);
      text-align: center;
    }
    .login-logo { font-size: 36px; margin-bottom: 12px; }
    .login-card h2 { font-size: 18px; font-weight: 700; color: #1a237e; margin-bottom: 4px; }
    .login-card p  { font-size: 13px; color: #888; margin-bottom: 28px; }
    .login-card input {
      width: 100%; padding: 12px 14px; border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 14px; margin-bottom: 14px; transition: border-color .18s;
    }
    .login-card input:focus { outline: none; border-color: #3949ab; box-shadow: 0 0 0 3px rgba(57,73,171,.12); }
    .login-card .btn-entrar {
      display: block; width: 100%; padding: 12px; background: #1a237e; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background .18s; text-decoration: none;
      text-align: center;
    }
    .login-card .btn-entrar:hover { background: #283593; }
    .login-erro { margin-top: 14px; padding: 10px 14px; background: #ffebee; border-left: 3px solid #c62828; border-radius: 6px; font-size: 13px; color: #b71c1c; display: none; text-align: left; }
  </style>
</head>
<body>

<!-- Tela de login -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <div class="login-logo">🔒</div>
    <h2>BRASAS DP – Painel Administrativo</h2>
    <p id="loginMsg">Acesse com sua conta BRASAS</p>
    <a class="btn-entrar" id="btnEntrar" href="<?= HUB_URL ?>">Entrar com conta BRASAS</a>
    <div class="login-erro" id="loginErro"></div>
  </div>
</div>

<div class="header">
  <div>
    <h1>BRASAS DP – Controle de Admissões</h1>
    <p>Painel administrativo – Pré-Admissão &nbsp;|&nbsp; <span id="usuarioLogado"></span></p>
  </div>
  <button class="btn-atualizar-tudo" onclick="atualizarTudo(this)">↻ Atualizar</button>
</div>

<div class="container">

  <!-- Solicitações dos diretores -->
  <div class="card">
    <div class="card-titulo">Solicitações dos Diretores</div>
    <div id="solicitacoesContainer"><div class="loading">Carregando...</div></div>
  </div>

  <!-- Gerar link avulso -->
  <div class="card">
    <div class="card-titulo">Gerar link avulso</div>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label for="nomeCandidato">Nome do candidato</label>
        <input type="text" id="nomeCandidato" placeholder="Ex: João da Silva">
      </div>
      <div class="form-group" style="flex:2">
        <label for="selectUnidade">Unidade</label>
        <select id="selectUnidade" disabled>
          <option value="">Carregando...</option>
        </select>
      </div>
      <button class="btn-gerar" id="btnGerar" onclick="gerarToken()">Gerar link</button>
    </div>

    <div class="resultado" id="resultado">
      <strong id="resultadoTitulo"></strong>
      <div class="link-gerado" id="linkGerado"></div>
      <button class="btn-copiar" onclick="copiarLink()">Copiar link</button>
    </div>
  </div>

  <!-- Tabela de tokens -->
  <div class="card">
    <div class="card-titulo">Links gerados</div>
    <div id="filtroTokensBar" style="display:none; margin-bottom:14px; gap:10px; flex-wrap:wrap; align-items:center">
      <input type="text" id="filtroCandidatoInput" placeholder="Buscar por nome..." oninput="aplicarFiltroTokens()"
        style="flex:1; min-width:180px; padding:8px 10px; border:1px solid #ddd; border-radius:6px; font-size:14px">
      <select id="filtroUnidadeSelect" onchange="aplicarFiltroTokens()"
        style="flex:1; min-width:180px; padding:8px 10px; border:1px solid #ddd; border-radius:6px; font-size:14px; background:#fff">
        <option value="">Todas as unidades</option>
      </select>
    </div>
    <div id="tabelaContainer"><div class="loading">Carregando...</div></div>
  </div>

  <!-- Formulários recebidos -->
  <div class="card">
    <div class="card-titulo">Formulários recebidos</div>
    <div id="enviosContainer"><div class="loading">Carregando...</div></div>
  </div>

</div>

<script>
  var _ultimoLink = '';
  var _tokensCache = [];

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Login via Hub ──────────────────────────────────────────────────────────

  var _sessionToken = '<?= SESSION_TOKEN ?>';

  function mostrarErroLogin(msg) {
    var el = document.getElementById('loginErro');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('loginMsg').textContent = 'Acesse com sua conta BRASAS';
    document.getElementById('btnEntrar').style.display = 'block';
  }

  // Valida automaticamente o token recebido do hub
  if (_sessionToken) {
    document.getElementById('loginMsg').textContent = 'Verificando sessão...';
    document.getElementById('btnEntrar').style.display = 'none';
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.autorizado) {
          document.getElementById('loginOverlay').style.display = 'none';
          document.getElementById('usuarioLogado').textContent = res.nome;
          carregarSolicitacoes();
          carregarTokens();
          carregarEnvios();
          google.script.run.withSuccessHandler(preencherSelectUnidades).listarUnidades();
        } else {
          mostrarErroLogin(res.motivo);
        }
      })
      .withFailureHandler(function() {
        mostrarErroLogin('Erro ao verificar sessão. Tente novamente.');
      })
      .validarSessaoHub(_sessionToken);
  }

  // ── Solicitações dos diretores ──────────────────────────────────────────────

  function carregarSolicitacoes() {
    document.getElementById('solicitacoesContainer').innerHTML = '<div class="loading">Carregando...</div>';
    google.script.run
      .withSuccessHandler(renderizarSolicitacoes)
      .withFailureHandler(function(err) {
        document.getElementById('solicitacoesContainer').innerHTML =
          '<div class="vazio">Erro ao carregar: ' + err.message + '</div>';
      })
      .listarSolicitacoes();
  }

  function renderizarSolicitacoes(lista) {
    if (!lista || lista.length === 0) {
      document.getElementById('solicitacoesContainer').innerHTML =
        '<div class="vazio">Nenhuma solicitação recebida ainda.</div>';
      return;
    }

    var html = '<table><thead><tr>' +
      '<th>Candidato</th><th>Unidade</th><th>Cargo</th><th>Data Admissão</th>' +
      '<th>Solicitado em</th><th>Status</th><th>Ação</th>' +
      '</tr></thead><tbody>';

    lista.forEach(function(s) {
      var badge;
      switch (s.status) {
        case 'Pendente':     badge = '<span class="badge badge-sol-pendente">Aguardando link</span>'; break;
        case 'Link gerado':  badge = '<span class="badge badge-sol-enviado">Link gerado</span>';    break;
        case 'Em andamento': badge = '<span class="badge badge-sol-andamento">Em andamento</span>'; break;
        case 'Concluído':    badge = '<span class="badge badge-sol-concluido">Concluído ✓</span>'; break;
        default:             badge = '<span class="badge badge-sol-pendente">' + esc(s.status) + '</span>';
      }

      var acao = '';
      if (s.status === 'Pendente') {
        acao = '<button class="btn-acao btn-acao-gerar" id="btn-sol-' + s.id + '" ' +
               'onclick="gerarLinkSolicitacao(\'' + s.id + '\')">Gerar link</button>';
      } else if (s.linkCandidato) {
        acao = '<button class="btn-copiar-link" data-link="' + esc(s.linkCandidato) + '" ' +
               'onclick="copiarLinkSolicitacao(this, \'' + s.linkCandidato + '\')">Copiar link</button>';
      }

      html += '<tr>' +
        '<td><strong>' + (esc(s.nome)        || '—') + '</strong></td>' +
        '<td>' + (esc(s.unidade)             || '—') + '</td>' +
        '<td>' + (esc(s.cargo)               || '—') + '</td>' +
        '<td>' + (esc(s.dataAdmissao)        || '—') + '</td>' +
        '<td>' + (esc(s.criado)              || '—') + '</td>' +
        '<td>' + badge + '</td>' +
        '<td id="acao-sol-' + s.id + '">' + acao + '</td>' +
        '</tr>';
    });

    html += '</tbody></table>';
    document.getElementById('solicitacoesContainer').innerHTML = html;
  }

  function gerarLinkSolicitacao(id) {
    var btn = document.getElementById('btn-sol-' + id);
    if (btn) { btn.disabled = true; btn.textContent = 'Gerando...'; }

    google.script.run
      .withSuccessHandler(function(res) {
        var cell = document.getElementById('acao-sol-' + id);
        if (cell) {
          cell.innerHTML =
            '<button class="btn-copiar-link" onclick="copiarLinkSolicitacao(this, \'' + res.url + '\')">' +
            'Copiar link</button>' +
            '<span class="link-inline">' + esc(res.url) + '</span>';
        }
        // Atualiza badge na linha
        carregarSolicitacoes();
      })
      .withFailureHandler(function(err) {
        if (btn) { btn.disabled = false; btn.textContent = 'Gerar link'; }
        alert('Erro: ' + err.message);
      })
      .criarTokenParaSolicitacao(id);
  }

  function copiarLinkSolicitacao(btn, link) {
    navigator.clipboard.writeText(link).then(function() {
      var orig = btn.textContent;
      btn.textContent = 'Copiado!';
      setTimeout(function() { btn.textContent = orig; }, 2000);
    });
  }

  function preencherSelectUnidades(unidades) {
    var sel = document.getElementById('selectUnidade');
    sel.innerHTML = '<option value="">— Selecione —</option>';
    unidades.forEach(function(u) {
      var opt = document.createElement('option');
      opt.value = u.razaoSocial + '|' + u.nome;
      opt.textContent = u.nome;
      sel.appendChild(opt);
    });
    sel.disabled = false;
  }

  // ── Token avulso ───────────────────────────────────────────────────────────

  function gerarToken() {
    var candidato  = document.getElementById('nomeCandidato').value.trim();
    var unidadeVal = document.getElementById('selectUnidade').value;

    if (!candidato || !unidadeVal) {
      mostrarResultado(false, 'Preencha o nome do candidato e selecione a unidade.');
      return;
    }

    var partes      = unidadeVal.split('|');
    var unidadeId   = partes[0];
    var unidadeNome = partes[1];

    var btn = document.getElementById('btnGerar');
    btn.disabled = true;
    btn.textContent = 'Gerando...';

    google.script.run
      .withSuccessHandler(function(res) {
        btn.disabled = false;
        btn.textContent = 'Gerar link';
        _ultimoLink = res.url;
        mostrarResultado(true, 'Link gerado para <strong>' + candidato + '</strong> — ' + unidadeNome + ':');
        document.getElementById('linkGerado').textContent = res.url;
        document.getElementById('nomeCandidato').value = '';
        document.getElementById('selectUnidade').value = '';
        carregarTokens();
      })
      .withFailureHandler(function(err) {
        btn.disabled = false;
        btn.textContent = 'Gerar link';
        mostrarResultado(false, 'Erro ao gerar token: ' + err.message);
      })
      .criarToken(candidato, unidadeId, unidadeNome);
  }

  function mostrarResultado(sucesso, html) {
    var div = document.getElementById('resultado');
    div.className = 'resultado ' + (sucesso ? 'sucesso' : 'erro');
    div.style.display = 'block';
    document.getElementById('resultadoTitulo').innerHTML = html;
    if (!sucesso) document.getElementById('linkGerado').textContent = '';
  }

  function copiarLink() {
    if (!_ultimoLink) return;
    navigator.clipboard.writeText(_ultimoLink).then(function() {
      var btn = document.querySelector('.btn-copiar');
      btn.textContent = 'Copiado!';
      setTimeout(function() { btn.textContent = 'Copiar link'; }, 2000);
    });
  }

  function copiarLinkTabela(link) {
    navigator.clipboard.writeText(link).then(function() {});
    document.querySelectorAll('.btn-copiar-link').forEach(function(b) {
      if (b.getAttribute('data-link') === link) {
        b.textContent = 'Copiado!';
        setTimeout(function() { b.textContent = 'Copiar'; }, 2000);
      }
    });
  }

  // ── Tokens ─────────────────────────────────────────────────────────────────

  function carregarTokens() {
    document.getElementById('tabelaContainer').innerHTML = '<div class="loading">Carregando...</div>';
    google.script.run
      .withSuccessHandler(renderizarTabela)
      .withFailureHandler(function(err) {
        document.getElementById('tabelaContainer').innerHTML =
          '<div class="vazio">Erro ao carregar: ' + err.message + '</div>';
      })
      .listarTokens();
  }

  function renderizarTabela(tokens) {
    _tokensCache = tokens ? tokens.slice().reverse() : [];

    var filtroBar = document.getElementById('filtroTokensBar');
    if (_tokensCache.length === 0) {
      filtroBar.style.display = 'none';
      document.getElementById('tabelaContainer').innerHTML =
        '<div class="vazio">Nenhum token gerado ainda.</div>';
      return;
    }

    // Popula dropdown de unidades com as que realmente existem na lista
    var unidades = [];
    _tokensCache.forEach(function(t) { if (t.unidade && unidades.indexOf(t.unidade) === -1) unidades.push(t.unidade); });
    unidades.sort();
    var sel = document.getElementById('filtroUnidadeSelect');
    var valorAtual = sel.value;
    sel.innerHTML = '<option value="">Todas as unidades</option>';
    unidades.forEach(function(u) {
      var opt = document.createElement('option');
      opt.value = u;
      opt.textContent = u;
      if (u === valorAtual) opt.selected = true;
      sel.appendChild(opt);
    });

    filtroBar.style.display = 'flex';
    aplicarFiltroTokens();
  }

  function aplicarFiltroTokens() {
    var termo = (document.getElementById('filtroCandidatoInput').value || '').toLowerCase().trim();
    var unidade = document.getElementById('filtroUnidadeSelect').value;

    var lista = _tokensCache.filter(function(t) {
      var nomeOk = !termo || (t.candidato || '').toLowerCase().indexOf(termo) !== -1;
      var unidadeOk = !unidade || t.unidade === unidade;
      return nomeOk && unidadeOk;
    });

    if (lista.length === 0) {
      document.getElementById('tabelaContainer').innerHTML =
        '<div class="vazio">Nenhum resultado para o filtro aplicado.</div>';
      return;
    }

    var html = '<table><thead><tr>' +
      '<th>Candidato</th><th>Unidade</th><th>Criado em</th><th>Status</th><th>Link</th><th></th>' +
      '</tr></thead><tbody>';

    lista.forEach(function(t) {
      var badge = t.usado
        ? '<span class="badge badge-usado">Completo em ' + esc(t.usadoEm || '—') + '</span>'
        : t.incompleto
          ? '<span class="badge badge-incompleto">Incompleto</span>'
          : '<span class="badge badge-pendente">Aguardando</span>';
      var linkBtn = t.link
        ? '<button class="btn-copiar-link" data-link="' + esc(t.link) + '" onclick="copiarLinkTabela(\'' + t.link + '\')">Copiar</button>'
        : '—';
      var token64 = btoa(t.token);
      var candidatoJs = JSON.stringify(t.candidato || '').replace(/"/g, '&quot;');
      html += '<tr>' +
        '<td>' + (esc(t.candidato) || '—') + '</td>' +
        '<td>' + (esc(t.unidade)   || '—') + '</td>' +
        '<td>' + (esc(t.criado)    || '—') + '</td>' +
        '<td>' + badge + '</td>' +
        '<td>' + linkBtn + '</td>' +
        '<td><button class="btn-excluir" onclick="excluirToken(\'' + token64 + '\',' + candidatoJs + ')">✕ Excluir</button></td>' +
        '</tr>';
    });

    html += '</tbody></table>';
    document.getElementById('tabelaContainer').innerHTML = html;
  }

  function excluirToken(token64, candidato) {
    if (!confirm('Excluir o registro de "' + candidato + '"?\nEsta ação não pode ser desfeita.')) return;
    var token = atob(token64);
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.ok) carregarTokens();
        else alert('Erro: ' + res.erro);
      })
      .withFailureHandler(function(err) { alert('Erro: ' + err.message); })
      .deletarToken(token);
  }

  // ── Envios ─────────────────────────────────────────────────────────────────

  function carregarEnvios() {
    document.getElementById('enviosContainer').innerHTML = '<div class="loading">Carregando...</div>';
    google.script.run
      .withSuccessHandler(renderizarEnvios)
      .withFailureHandler(function(err) {
        document.getElementById('enviosContainer').innerHTML =
          '<div class="vazio">Erro ao carregar: ' + err.message + '</div>';
      })
      .listarEnvios();
  }

  function renderizarEnvios(envios) {
    if (!envios || envios.length === 0) {
      document.getElementById('enviosContainer').innerHTML =
        '<div class="vazio">Nenhum formulário recebido ainda.</div>';
      return;
    }

    var html = '<table><thead><tr>' +
      '<th>Candidato</th><th>Unidade</th><th>Data de envio</th><th>Status</th><th>Drive</th><th></th>' +
      '</tr></thead><tbody>';

    envios.forEach(function(e, idx) {
      var pendCount = e.pendentes.length;
      var badge = pendCount > 0
        ? '<span class="badge badge-pendente">' + pendCount + ' pendente' + (pendCount > 1 ? 's' : '') + '</span>'
        : '<span class="badge badge-completo">Completo ✓</span>';

      var pastaBtn = e.pastaUrl
        ? '<a href="' + esc(e.pastaUrl) + '" target="_blank" class="btn-copiar-link">📁 Abrir</a>'
        : '—';

      html += '<tr>' +
        '<td><strong>' + (esc(e.candidato) || '—') + '</strong></td>' +
        '<td>' + (esc(e.unidade)   || '—') + '</td>' +
        '<td>' + (esc(e.dataEnvio) || '—') + '</td>' +
        '<td>' + badge + '</td>' +
        '<td>' + pastaBtn + '</td>' +
        '<td><button class="btn-copiar-link" onclick="toggleDocs(' + idx + ')">▼ Documentos</button></td>' +
        '</tr>' +
        '<tr id="docs-row-' + idx + '" class="detail-row" style="display:none">' +
        '<td colspan="6">' +
        '<div class="docs-detalhe">' +
        '<div class="docs-col enviados-col">' +
        '<strong>Enviados (' + e.enviados.length + ')</strong>' +
        '<ul>' + e.enviados.map(function(d) { return '<li>' + esc(d) + '</li>'; }).join('') + '</ul>' +
        '</div>' +
        (pendCount > 0
          ? '<div class="docs-col pendentes-col">' +
            '<strong>Pendentes (' + pendCount + ')</strong>' +
            '<ul>' + e.pendentes.map(function(d) { return '<li>' + esc(d) + '</li>'; }).join('') + '</ul>' +
            '</div>'
          : '') +
        '</div></td></tr>';
    });

    html += '</tbody></table>';
    document.getElementById('enviosContainer').innerHTML = html;
  }

  function toggleDocs(idx) {
    var row = document.getElementById('docs-row-' + idx);
    row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
  }

  function atualizarTudo(btn) {
    var orig = btn.textContent;
    btn.textContent = 'Atualizando...';
    btn.disabled = true;
    setTimeout(function() { btn.textContent = orig; btn.disabled = false; }, 2000);
    carregarSolicitacoes();
    carregarTokens();
    carregarEnvios();
  }

  // Carregamento inicial feito após autenticação bem-sucedida
</script>
</body>
</html>
